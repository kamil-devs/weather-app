<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="bg-anim" aria-hidden="true"></div>
    <header class="header">
        <div class="header-inner">
            <div class="logo">🌤️ Weather by Kamil</div>
            <div class="search-wrap">
                <input type="text" id="city-input" placeholder="Search city…" autocomplete="off" />
                <div id="suggestions" class="suggestions-dropdown hidden"></div>
                <button id="search-btn" title="Search">→</button>
                <button id="locate-btn" title="Detect my location">📍</button>
            </div>
            <button id="theme-btn" class="theme-btn" title="Switch to light mode">☀️</button>
        </div>
    </header>

    <!-- Skeleton loader — shown while fetching, mirrors content layout -->
    <div id="skeleton" class="content hidden" aria-hidden="true">
        <div class="top-grid">
            <div class="card">
                <div class="current-top">
                    <div style="flex:1">
                        <div class="sk sk-city-name"></div>
                        <div class="sk sk-desc"></div>
                    </div>
                    <div class="sk sk-icon-lg"></div>
                </div>
                <div class="sk sk-temp-lg"></div>
                <div class="details-grid">
                    <div class="sk sk-detail"></div>
                    <div class="sk sk-detail"></div>
                    <div class="sk sk-detail"></div>
                    <div class="sk sk-detail"></div>
                    <div class="sk sk-detail"></div>
                    <div class="sk sk-detail"></div>
                </div>
            </div>
            <div class="card" style="display:flex;flex-direction:column;gap:12px">
                <div class="sk sk-map-label"></div>
                <div class="sk sk-map-box"></div>
            </div>
        </div>
        <div class="forecast-grid">
            <div class="card forecast-card"><div class="sk sk-fc"></div></div>
            <div class="card forecast-card"><div class="sk sk-fc"></div></div>
            <div class="card forecast-card"><div class="sk sk-fc"></div></div>
            <div class="card forecast-card"><div class="sk sk-fc"></div></div>
            <div class="card forecast-card"><div class="sk sk-fc"></div></div>
        </div>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>

    <main id="content" class="content hidden">
        <div class="top-grid">
            <div class="card current-card">
                <div class="current-top">
                    <div>
                        <div class="city-name" id="city-name"></div>
                        <div class="weather-desc" id="weather-desc"></div>
                    </div>
                    <div class="weather-icon-lg" id="weather-emoji"></div>
                </div>
                <div class="temp-display">
                    <span id="temp"></span><span class="unit">°C</span>
                </div>
                <div class="details-grid">
                    <div class="detail-item" data-tooltip="Temperature adjusted for humidity and wind chill">
                        <span class="detail-icon">🌡️</span>
                        <div>
                            <div class="detail-label">Feels like</div>
                            <div class="detail-value" id="feels-like"></div>
                        </div>
                    </div>
                    <div class="detail-item" data-tooltip="Today's forecast high and low temperatures">
                        <span class="detail-icon">🔼</span>
                        <div>
                            <div class="detail-label">High / Low</div>
                            <div class="detail-value" id="high-low"></div>
                        </div>
                    </div>
                    <div class="detail-item" data-tooltip="Relative humidity — higher means more moisture in the air">
                        <span class="detail-icon">💧</span>
                        <div>
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value" id="humidity"></div>
                        </div>
                    </div>
                    <div class="detail-item" data-tooltip="Wind speed in metres per second">
                        <span class="detail-icon">💨</span>
                        <div>
                            <div class="detail-label">Wind</div>
                            <div class="detail-value" id="wind"></div>
                        </div>
                    </div>
                    <div class="detail-item" data-tooltip="How far you can see horizontally">
                        <span class="detail-icon">👁️</span>
                        <div>
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value" id="visibility"></div>
                        </div>
                    </div>
                    <div class="detail-item" data-tooltip="Local sunrise and sunset times">
                        <span class="detail-icon">🌅</span>
                        <div>
                            <div class="detail-label">Sunrise / Sunset</div>
                            <div class="detail-value" id="sunrise-sunset"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card map-card">
                <div class="map-title">📍 <span id="map-city-label"></span></div>
                <div id="map"></div>
            </div>
        </div>

        <section id="hourly-section" class="card hourly-section hidden">
            <h2 class="section-title">🕒 Today's Temperature</h2>
            <div class="chart-wrap">
                <canvas id="hourly-chart"></canvas>
            </div>
        </section>

        <div id="alerts-section" class="alerts-section hidden">
            <h2 class="section-title">⚠️ Weather Alerts</h2>
            <div id="alerts-list"></div>
        </div>

        <div class="forecast-section">
            <h2 class="section-title">📅 5-Day Forecast</h2>
            <div id="forecast-grid" class="forecast-grid"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
